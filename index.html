<!doctype html>
<html lang="es">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control de Gastos 🎀</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
body {
background-color: #ffe6f2;
font-family: "Quicksand", sans-serif;
}

h1 {
color: #d6336c;
font-weight: 700;
}

.card {
border: none;
border-radius: 20px;
}

.card-form {
background-color: #fff0f6;
}

.card-detalle {
background-color: #fff0f6;
}

.tarjeta-valores {
min-height: 105px;
}

.tarjeta-valores > .card-body {
display: flex;
flex-direction: column;
justify-content: center;
}

.bg-rosa {
background-color: #f383ab !important;
}

.bg-morado {
background-color: #b197fc !important;
}

.btn-kawaii {
background-color: #d6336c;
border: none;
border-radius: 12px;
color: #fff;
font-weight: 600;
padding-left: 1.2rem;
padding-right: 1.2rem;
}

.btn-kawaii:hover {
background-color: #c2255c;
color: #fff;
}

.form-control {
border-radius: 12px;
border: 2px solid #fcc2d7;
}

.form-control:focus {
border-color: #f783ac;
box-shadow: 0 0 0 0.25rem rgba(247, 131, 172, 0.25);
}

.table> :not(caption)>*>* {
padding-top: 0.9rem;
padding-bottom: 0.9rem;
}

.list-group-item {
background-color: #fff0f6;
border-color: #fcc2d7;
border-radius: 12px !important;
margin-bottom: 8px;
}

.card-title {
color: #d6336c;
font-weight: 700;
}
</style>
</head>

<body>
<div class="container py-4" style="max-width: 800px">
<h1 class="text-center mb-4">🎀 Control de Gastos 🎀</h1>

<!-- Tarjeta del formulario -->
<div class="card card-form shadow-sm mb-4">
<div class="card-body">
<h5 class="card-title mb-3">💖 Agregar gasto</h5>
<div class="row g-2">
<div class="col-12 col-md-3">
<input type="text" id="inputCategoria" class="form-control text-capitalize" placeholder="Categoría" list="listaCategorias" />
<datalist id="listaCategorias">
<option value="Comida"></option>
<option value="Transporte"></option>
<option value="Ocio"></option>
<option value="Salud"></option>
<option value="Servicios"></option>
<option value="Educación"></option>
<option value="Hogar"></option>
</datalist>
</div>
<div class="col-12 col-md-3">
<input type="text" id="inputDescripcion" class="form-control text-capitalize" placeholder="Descripción" />
</div>
<div class="col-6 col-md-3">
<input type="month" id="inputFecha" class="form-control" />
</div>
<div class="col-6 col-md-3">
<input type="number" id="inputMonto" class="form-control" placeholder="Monto" />
</div>
<div class="col-12">
<button id="btnAgregar" class="btn btn-kawaii w-100">Agregar♡</button>
</div>
</div>

<!-- Tarjetas de resumen -->
<div class="row g-3 mb-4 mt-4">
<div class="col-6">
<div class="card text-center shadow-sm text-white bg-rosa tarjeta-valores">
<div class="card-body">
<h6>💸 Total gastado</h6>
<h4 class="mb-0"><span id="totalGastado">$0</span></h4>
</div>
</div>
</div>
<div class="col-6">
<div class="card text-center shadow-sm text-white bg-morado tarjeta-valores">
<div class="card-body">
<h6>🌸 Promedio gastos</h6>
<h4 class="mb-0"><span id="promedioGasto">$0</span></h4>
</div>
</div>
</div>
</div>
<p class="text-center">
Donde más gastas:
<strong><span id="categoriaConMasGasto">-</span></strong>
</p>

<!-- Lista de gastos -->
<div class="card card-detalle shadow-sm">
<div class="card-body">
<h5 class="card-title mb-3">🎀 Detalle</h5>
<div class="table-responsive">
<table class="table table-hover align-middle">
<thead>
<tr>
<th>Mes</th>
<th>Categoría</th>
<th>Descripción</th>
<th class="text-end">Monto</th>
<th></th>
</tr>
</thead>
<tbody id="listaGastos"></tbody>
</table>
</div>
</div>
</div>
</div>

<script src="./assets/js/app.js"></script>
</body>

</html>
